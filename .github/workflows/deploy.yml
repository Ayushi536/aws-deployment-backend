# .github/workflows/deploy.yml
# Auto-deploys to AWS EC2 on every push to main branch
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   EC2_HOST         → Public IP of your EC2 instance (e.g. 13.xx.xx.xx)
#   EC2_USER         → SSH username (usually "ubuntu" for Ubuntu EC2)
#   EC2_PRIVATE_KEY  → Full contents of your .pem key file

name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/aws-deployment-backend
            git pull origin main
            npm install --production
            pm2 reload ecosystem.config.js --env production
